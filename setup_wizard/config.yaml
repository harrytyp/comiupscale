# COMI Upscaled — Configuration
# Generated by setup.py — edit manually or re-run the wizard

# ── Game ─────────────────────────────────────────────
game:
  path: ""              # Path to your Monkey Island 3 game folder (COMI.LA0/1/2)
  id: "game"

# ── Pipeline mode ────────────────────────────────────
# express:         Download pre-upscaled assets, skip upscaling
# full:            Extract + upscale everything from scratch
# bring-your-own:  You supply HD PNGs, skip extract + upscale
mode: "express"

# ── Upscaling engine ─────────────────────────────────
upscale:
  enabled: true
  engine: "realesrgan-ncnn-vulkan"
  model: "realesrgan-x4plus-anime"    # or: realesrgan-x4plus, realesr-animevideov3
  scale: 4
  gpu: "auto"                        # auto | 0 | 1 | 0,1 (for multi-gpu)
  tile_size: 0                       # 0=auto, >32 for VRAM-limited GPUs

# ── Alpha mask filter ────────────────────────────────
# Controls anti-aliasing on sprite transparency edges.
# lanczos:  Best quality, slower
# bilinear: Good quality, faster
# nearest:  No anti-aliasing, fastest (jagged edges)
alpha:
  enabled: true
  filter: "lanczos"

# ── Pre-upscaled downloads ───────────────────────────
# If mode is "express", these URLs are used to download assets.
# If blank, the wizard will prompt you for a source.
assets:
  pre_upscaled_url: ""
  pre_upscaled_checksum: ""
  cutscene_videos_url: ""
  cutscene_videos_checksum: ""

# ── ScummVM HD fork ──────────────────────────────────
scummvm:
  source: "build"                    # build | download
  fork_repo: ""
  binary_url: ""
  platform: "auto"
