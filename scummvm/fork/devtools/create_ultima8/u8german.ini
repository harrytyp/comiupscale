spell of resurrection=Der Zauber 'Wiedererweckung'~~ Stellos' Worte, von Cyrrus getreulich niedergeschrieben~~ In meinen vielen Jahren als Oberhaupt der Theurgisten hier auf der Insel Silberfels denke ich immer noch am liebsten an den Augenblick zurück, als ich den Wiedererweckungszauber von der Mystischen Stimme, unserer heiligen Stratos, erhielt. Ich war erst 60 Jahre alt, als Kalen die Leiche seiner Geliebten zu mir brachte. Sie war schon vor mehreren Tagen verstorben, und ich wußte, daß ich nichts mehr für ihn tun konnte. Aber ich sah das Feuer der Liebe in seinen Augen und ich wußte, daß ich es zumindest versuchen mußte. Ich ging mit der Leiche zur Sturmspitze und flehte Stratos an, die Seele in den Körper zurückkehren zu lassen. Stratos warnte mich, daß ich dafür ein großes Opfer erbringen müßte. Ich erklärte mich sofort einverstanden. Und dann begann die Reise, die ich nie vergessen werde.~Meine Seele verließ meinen Körper und ich begann zu fliegen. Oh, ich kann nicht beschreiben, was das für ein Gefühl war. Ich schwebte über den Wolken. Aber als ich höher in den Himmel stieg, wurden die Winde stärker, und bald war es fast unmöglich, weiterzufliegen. Und doch gab ich nicht auf, sondern kämpfte mich mühsam vorwärts.~Plötzlich erschien vor meinen Augen eine schimmernde Wolke. Ich war am Ende des Himmels und der ätherischen Leere angelangt. Ich flog geradeaus in die Wolke und sah einen gleißenden Feuerball, so hell, daß ich nicht einmal hinsehen konnte. Stratos flüsterte mir zu, daß dies etwas war, was die Paganen seit langer Zeit nicht mehr gesehen hatten... sie nannte es die Sonne.~In diesem Augenblick öffnete sich der Mund meines Körpers, den ich auf der Erde zurückgelassen hatte und atmete den Lebensodem in die Leiche der Geliebten Kalens.~Und dann war meine Seele plötzlich in meinen Körper zurückgekehrt. Ich befand mich in völliger Dunkelheit. Ich fragte Stratos, was geschehen sei und weshalb ich nichts sehen konnte. Keldan begann zu weinen und da wußte ich, daß der Anblick der wundervollen Sonne mir mein Augenlicht genommen hatte. Aber ich wußte, daß ich gerne bereit war, diesen Preis zu zahlen, denn Keldan legte ihre sanfte Hand in meine und dankte mir. Ich erwarte von keinem anderen Theurgisten, ein solches Opfer zu erbringen. Aus diesem Grunde gibt es auch kein Zaubersymbol und keine magischen Worte für den Wiedererweckungszauber.

